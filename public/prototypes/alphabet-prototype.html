<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Alphabet Match Prototype</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-color: #fdf2f8;
        --card-bg: #ffffff;
        --text-color: #831843;
        --primary-color: #ec4899;
        --secondary-color: #f472b6;
        --accent-color: #fbcfe8;
        --success-color: #4ade80;
        --error-color: #f87171;
        --shadow: 0 10px 25px rgba(236, 72, 153, 0.15);
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: 'Fredoka', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
      }

      header {
        padding: 20px;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: 2rem;
        font-weight: 700;
        color: var(--primary-color);
      }

      .game-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-around;
        width: 100%;
        max-width: 500px;
        padding: 20px;
      }

      .image-card {
        width: 100%;
        aspect-ratio: 1;
        background: var(--card-bg);
        border-radius: 40px;
        border: 8px solid var(--accent-color);
        box-shadow: var(--shadow);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .image-card img {
        width: 90%;
        height: 90%;
        object-fit: contain;
      }

      .choices-container {
        display: flex;
        gap: 15px;
        width: 100%;
        justify-content: center;
        margin-top: 20px;
      }

      .choice-btn {
        flex: 1;
        aspect-ratio: 1;
        min-height: 80px;
        max-width: 120px;
        background: var(--card-bg);
        border: 6px solid var(--accent-color);
        border-radius: 30px;
        font-family: 'Nunito', sans-serif;
        font-size: 2.5rem;
        font-weight: 900;
        color: var(--primary-color);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 6px 0 var(--accent-color);
        transition: all 0.15s ease;
        position: relative;
        top: 0;
      }

      .choice-btn:active {
        top: 4px;
        box-shadow: 0 2px 0 var(--accent-color);
      }

      .choice-btn.correct {
        background-color: var(--success-color);
        border-color: #22c55e;
        color: white;
        box-shadow: 0 6px 0 #16a34a;
        animation: bounce 0.5s ease;
      }

      .choice-btn.wrong {
        background-color: var(--error-color);
        border-color: #ef4444;
        color: white;
        box-shadow: 0 6px 0 #dc2626;
        animation: shake 0.4s ease;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.15);
        }
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-8px);
        }
        75% {
          transform: translateX(8px);
        }
      }

      .fade-in {
        animation: fadeIn 0.5s ease-out forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .star-container {
        position: absolute;
        pointer-events: none;
        width: 100%;
        height: 100%;
      }

      .star {
        position: absolute;
        font-size: 24px;
        animation: flyUp 1s ease-out forwards;
      }

      @keyframes flyUp {
        to {
          transform: translateY(-100px) rotate(360deg);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Alphabet Match</h1>
    </header>

    <div class="game-container">
      <div id="imageCard" class="image-card">
        <img id="promptImage" src="" alt="What letter?" />
        <div id="starField" class="star-container"></div>
      </div>

      <div id="choices" class="choices-container">
        <!-- Buttons will be generated here -->
      </div>
    </div>

    <script>
      const ASSETS = [
        {
          letter: 'A',
          files: ['ant-aardvark-antelope.svg', 'apple-avocado-asparagus.svg'],
        },
        {
          letter: 'B',
          files: ['banana-blueberry-brocolli.svg', 'bat-bever-butterfly.svg'],
        },
        {
          letter: 'C',
          files: ['carrot-corn-cucumber.svg', 'cat-camel-cow.svg'],
        },
        {
          letter: 'D',
          files: ['dates-dandelions-dumplings.svg', 'dog-dophin-duckling.svg'],
        },
      ]

      const ALL_LETTERS = ['A', 'B', 'C', 'D']
      const ASSET_PATH = '../src/assets/alphabet/'

      let currentTarget = null
      let isTransitioning = false

      function initGame() {
        nextLevel()
      }

      function nextLevel() {
        isTransitioning = false

        // Select random letter
        const targetIdx = Math.floor(Math.random() * ASSETS.length)
        const targetData = ASSETS[targetIdx]

        // Select random file for that letter
        const fileIdx = Math.floor(Math.random() * targetData.files.length)
        const fileName = targetData.files[fileIdx]

        currentTarget = targetData.letter

        // Update UI
        const img = document.getElementById('promptImage')
        img.src = ASSET_PATH + fileName
        img.className = 'fade-in'

        generateChoices()
      }

      function generateChoices() {
        const choicesContainer = document.getElementById('choices')
        choicesContainer.innerHTML = ''

        const choices = [currentTarget]

        // Pick 2 distractors
        const others = ALL_LETTERS.filter((l) => l !== currentTarget)
        while (choices.length < 3) {
          const rand = others[Math.floor(Math.random() * others.length)]
          if (!choices.includes(rand)) choices.push(rand)
        }

        // Shuffle
        choices.sort(() => Math.random() - 0.5)

        choices.forEach((letter) => {
          const btn = document.createElement('button')
          btn.className = 'choice-btn fade-in'
          btn.innerHTML = `${letter}${letter.toLowerCase()}`
          btn.onclick = () => handleChoice(letter, btn)
          choicesContainer.appendChild(btn)
        })
      }

      function handleChoice(selectedLetter, btn) {
        if (isTransitioning) return

        if (selectedLetter === currentTarget) {
          isTransitioning = true
          btn.classList.add('correct')
          celebrate()
          setTimeout(nextLevel, 1500)
        } else {
          btn.classList.add('wrong')
          setTimeout(() => btn.classList.remove('wrong'), 500)
        }
      }

      function celebrate() {
        const starField = document.getElementById('starField')
        for (let i = 0; i < 10; i++) {
          const star = document.createElement('div')
          star.className = 'star'
          star.innerHTML = '⭐'
          star.style.left = Math.random() * 80 + 10 + '%'
          star.style.top = Math.random() * 80 + 10 + '%'
          star.style.animationDelay = Math.random() * 0.2 + 's'
          starField.appendChild(star)
          setTimeout(() => star.remove(), 1000)
        }
      }

      window.onload = initGame
    </script>
  </body>
</html>
