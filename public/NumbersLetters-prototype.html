<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dot Math Builder - V5</title>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --primary: #48dbfb;
      --primary-dark: #0abde3;
      --add: #1dd1a1;
      --add-dark: #10ac84;
      --sub: #ff6b6b;
      --sub-dark: #ee5253;
      --answer: #9b59b6;
      --answer-dark: #8e44ad;
      --neutral: #c8d6e5;
      --bg: #fdfaf6;
      --surface: #ffffff;
      --text: #222f3e;
      --star: #feca57;
    }

    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .app-container {
      background: var(--surface);
      width: 100%;
      max-width: 650px;
      padding: 30px;
      border-radius: 32px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
      text-align: center;
    }

    /* Typography & Layout */
    h1 { font-size: 32px; margin-bottom: 10px; color: var(--primary-dark); }
    h2 { font-size: 28px; margin: 10px 0; }
    .row { display: flex; justify-content: center; align-items: center; gap: 16px; flex-wrap: wrap; }
    .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    
    /* Setup Controls */
    .stepper-btn-small {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background-color: var(--primary);
      color: white;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 0 var(--primary-dark);
      transition: all 0.1s;
      user-select: none;
    }
    .stepper-btn-small:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 0 0 var(--primary-dark); }
    .stepper-btn-small:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: 0 4px 0 #95afc0; background-color: var(--neutral); }

    /* Math Equation Display */
    .term-box {
      background: var(--bg);
      border: 3px dashed var(--neutral);
      border-radius: 24px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      min-height: 60px;
      width: 80%;
      justify-content: center;
    }

    .term-number {
      font-size: 56px;
      font-weight: bold;
      line-height: 1;
    }

    .large-operator {
      font-size: 72px;
      font-weight: bold;
      color: var(--text);
      line-height: 0.8;
      margin: 10px 0;
    }

    .dots-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: 180px;
      justify-content: flex-start;
    }

    /* Individual Dots */
    .dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      box-shadow: inset -4px -4px 10px rgba(0,0,0,0.15);
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      position: relative;
    }

    .dot-a { background: var(--primary); }
    .dot-b-add { background: var(--add); }
    .dot-c { background: var(--answer); width: 40px; height: 40px; }
    
    .dot.crossed {
      background: #e1e8f0;
      box-shadow: none;
    }
    .dot.crossed::after {
      content: '❌';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 20px;
      animation: stamp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    /* Answer Box */
    .answer-box {
      border: 3px dashed var(--answer);
      background: rgba(155, 89, 182, 0.05);
      border-radius: 24px;
      min-height: 100px;
      width: 80%;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    /* Play Controls */
    .build-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      background-color: var(--answer);
      color: white;
      font-size: 42px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 6px 0 var(--answer-dark);
      transition: all 0.1s;
      user-select: none;
    }
    .build-btn:active:not(:disabled) { transform: translateY(6px); box-shadow: 0 0 0 var(--answer-dark); }
    .build-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: 0 6px 0 #95afc0; background-color: var(--neutral); }

    .action-btn {
      padding: 16px 40px;
      font-size: 24px;
      font-weight: bold;
      background-color: var(--add);
      color: white;
      border: none;
      border-radius: 32px;
      cursor: pointer;
      box-shadow: 0 6px 0 var(--add-dark);
      margin-top: 20px;
      width: 80%;
      transition: all 0.1s;
    }
    .action-btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--add-dark); }

    /* Scoreboard */
    .scoreboard {
      display: flex;
      justify-content: space-between;
      background: var(--bg);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
      color: var(--neutral);
    }

    /* Animations */
    @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    @keyframes stamp { 0% { transform: translate(-50%, -50%) scale(3); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-10px); }
      40%, 80% { transform: translateX(10px); }
    }
    .fade-in { animation: popIn 0.4s ease forwards; }
    .animate-shake { animation: shake 0.5s ease; }
    .animate-bounce { animation: bounce 0.6s ease; }
    
    .star-icon { font-size: 48px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1)); }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Sub-component: Setup Stepper ---
    const Stepper = ({ icon, value, min, max, onChange }) => (
      <div className="col">
        <span style={{ fontSize: '20px', fontWeight: 'bold', color: 'var(--text)' }}>{icon}</span>
        <div className="row" style={{ gap: '15px' }}>
          <button className="stepper-btn-small" onClick={() => onChange(value - 1)} disabled={value <= min}>−</button>
          <span style={{ fontSize: '42px', fontWeight: 'bold', width: '50px' }}>{value}</span>
          <button className="stepper-btn-small" onClick={() => onChange(value + 1)} disabled={value >= max}>+</button>
        </div>
      </div>
    );

    const App = () => {
      // App Phases: 'setup', 'play', 'end'
      const [phase, setPhase] = useState('setup');
      
      // Setup Config
      const [totalProblems, setTotalProblems] = useState(5);
      const [starReward, setStarReward] = useState(3);
      
      // Game State
      const [problemIndex, setProblemIndex] = useState(0);
      const [successCount, setSuccessCount] = useState(0);
      const [failCount, setFailCount] = useState(0);
      
      // Current Math Problem
      const [valA, setValA] = useState(0);
      const [valB, setValB] = useState(0);
      const [op, setOp] = useState('+'); 
      const [userC, setUserC] = useState(0);
      const [feedback, setFeedback] = useState('idle'); // 'idle', 'correct', 'wrong'

      const generateProblem = () => {
        const isAdd = Math.random() > 0.5;
        let a = Math.floor(Math.random() * 10) + 1; // 1 to 10
        let b = Math.floor(Math.random() * 10) + 1; // 1 to 10
        
        // Prevent negative results
        if (!isAdd && b > a) {
          const temp = a; a = b; b = temp;
        }
        
        setValA(a);
        setValB(b);
        setOp(isAdd ? '+' : '-');
        setUserC(0);
        setFeedback('idle');
      };

      const handleStart = () => {
        setProblemIndex(0);
        setSuccessCount(0);
        setFailCount(0);
        generateProblem();
        setPhase('play');
      };

      const expectedC = op === '+' ? valA + valB : valA - valB;

      const handleCheck = () => {
        if (userC === expectedC) {
          setFeedback('correct');
          setSuccessCount(s => s + 1);
          
          setTimeout(() => {
            if (problemIndex + 1 >= totalProblems) {
              setPhase('end');
            } else {
              setProblemIndex(i => i + 1);
              generateProblem();
            }
          }, 1500); // 1.5s celebration before next
        } else {
          setFeedback('wrong');
          setFailCount(f => f + 1);
          setTimeout(() => setFeedback('idle'), 600);
        }
      };

      const handleRestart = () => setPhase('setup');

      // --- RENDER VIEWS ---

      if (phase === 'setup') {
        return (
          <div className="app-container fade-in">
            <h1>Let's Set Up! 🎨</h1>
            <p style={{ color: 'var(--neutral)', fontSize: '18px', marginBottom: '30px' }}>Choose your challenge</p>
            
            <div className="col" style={{ gap: '40px' }}>
              <Stepper 
                icon="🔢 How many puzzles?" 
                value={totalProblems} min={1} max={10} onChange={setTotalProblems} 
              />
              <Stepper 
                icon="⭐ Stars to win!" 
                value={starReward} min={1} max={5} onChange={setStarReward} 
              />
              <button className="action-btn" onClick={handleStart} style={{ marginTop: '10px' }}>Let's Play! 🚀</button>
            </div>
          </div>
        );
      }

      if (phase === 'end') {
        return (
          <div className="app-container fade-in">
            <h1 style={{ fontSize: '42px', color: 'var(--add)' }}>You Did It! 🎉</h1>
            <div className="row" style={{ margin: '40px 0', gap: '20px' }}>
              {Array.from({ length: starReward }).map((_, i) => (
                <div key={i} className="star-icon animate-bounce" style={{ animationDelay: `${i * 0.15}s` }}>⭐</div>
              ))}
            </div>
            <h2>You solved {successCount} puzzles!</h2>
            {failCount > 0 ? (
              <p style={{ color: 'var(--neutral)', fontSize: '18px' }}>(And you kept trying {failCount} times when it was tricky! 💪)</p>
            ) : (
              <p style={{ color: 'var(--neutral)', fontSize: '18px' }}>(Perfect score! Wow! 🌟)</p>
            )}
            <button className="action-btn" onClick={handleRestart}>Play Again</button>
          </div>
        );
      }

      // --- PLAY PHASE ---
      const isCorrect = feedback === 'correct';
      const isWrong = feedback === 'wrong';

      return (
        <div className={`app-container ${isWrong ? 'animate-shake' : ''} ${isCorrect ? 'fade-in' : ''}`}>
          
          <div className="scoreboard">
            <span>Puzzle {problemIndex + 1} of {totalProblems}</span>
            <div className="row" style={{ gap: '15px' }}>
              <span style={{ color: 'var(--add-dark)' }}>✅ {successCount}</span>
              <span style={{ color: 'var(--sub-dark)' }}>🔄 {failCount}</span>
            </div>
          </div>

          {/* --------------------------------------------------- */}
          {/* THE PROBLEM VIEW                                      */}
          {/* --------------------------------------------------- */}
          <div className="col" style={{ gap: '10px' }}>
            
            {/* Term A */}
            <div className="term-box">
              <span className="term-number" style={{ color: 'var(--primary)' }}>{valA}</span>
              <div className="dots-container">
                {Array.from({ length: valA }).map((_, i) => (
                  <div key={`a-${i}`} className="dot dot-a" style={{ animationDelay: `${i * 0.05}s` }}/>
                ))}
              </div>
            </div>

            {/* Operator */}
            <div className="large-operator" style={{ color: op === '+' ? 'var(--add)' : 'var(--sub)' }}>
              {op === '+' ? '+' : '−'}
            </div>

            {/* Term B */}
            <div className="term-box">
              <span className="term-number" style={{ color: op === '+' ? 'var(--add)' : 'var(--sub)' }}>{valB}</span>
              <div className="dots-container">
                {Array.from({ length: valB }).map((_, i) => (
                  <div 
                    key={`b-${i}`} 
                    className={`dot ${op === '+' ? 'dot-b-add' : 'crossed'}`} 
                    style={{ animationDelay: `${(op === '+' ? 0 : 0.4) + (i * 0.1)}s` }}
                  />
                ))}
              </div>
            </div>

            {/* Equals */}
            <div className="large-operator">=</div>

          </div>

          {/* --------------------------------------------------- */}
          {/* THE ANSWER VIEW (User builds C)                       */}
          {/* --------------------------------------------------- */}
          <div className="col" style={{ gap: '15px', marginTop: '10px' }}>
            <span style={{ fontWeight: 'bold', color: 'var(--answer)', fontSize: '20px' }}>Build your answer:</span>
            
            <div className="answer-box">
              {Array.from({ length: userC }).map((_, i) => (
                <div key={`c-${i}`} className="dot dot-c" />
              ))}
              {userC === 0 && <span style={{ color: 'var(--answer)', opacity: 0.5, fontStyle: 'italic', fontSize: '24px' }}>Empty</span>}
            </div>

            <div className="row" style={{ marginTop: '10px', width: '100%', gap: '30px' }}>
              <button 
                className="build-btn" 
                onClick={() => setUserC(Math.max(0, userC - 1))} 
                disabled={userC === 0 || isCorrect}
              >−</button>
              
              <span className="term-number" style={{ color: 'var(--answer)' }}>
                {userC}
              </span>
              
              <button 
                className="build-btn" 
                onClick={() => setUserC(userC + 1)} 
                disabled={userC >= 20 || isCorrect}
              >+</button>
            </div>
          </div>

          {/* --------------------------------------------------- */}
          {/* FEEDBACK / SUBMIT                                     */}
          {/* --------------------------------------------------- */}
          {isCorrect ? (
            <h2 className="fade-in animate-bounce" style={{ color: 'var(--add)', marginTop: '20px', fontSize: '32px' }}>
              Awesome! ✨
            </h2>
          ) : (
            <button className="action-btn" onClick={handleCheck}>
              Check Answer! ✨
            </button>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
