<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Princess Magic Learning 👑</title>
  <style>
    :root{
      --bg1:#fbcfe8;
      --bg2:#e9d5ff;
      --app-bg:#fdf2f8;
      --primary:#ec4899;
      --secondary:#a855f7;
      --text:#831843;
      --border:#f9a8d4;
      --card-border:#fce7f3;
      --success:#10b981;
      --warn:#f59e0b;
      --shadow:#db7db5;
      --shadow-active:#7e22ce;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      overflow:hidden;
    }

    #phone-container{
      width:360px;
      height:740px;
      background: var(--app-bg);
      border:8px solid var(--border);
      border-radius:40px;
      box-shadow:0 20px 50px rgba(0,0,0,0.2);
      display:flex;
      flex-direction:column;
      padding:18px;
      position:relative;
      user-select:none;
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin: 6px 0 10px 0;
    }

    h1{
      font-size:22px;
      text-align:center;
      margin:0;
      color: var(--primary);
      text-shadow: 1px 1px white;
      flex:1;
      line-height:1.1;
    }

    .icon-btn{
      width:46px;
      height:46px;
      border-radius:16px;
      border:3px solid var(--border);
      background:#fff;
      font-size:20px;
      box-shadow:0 4px 0 var(--border);
      cursor:pointer;
    }
    .icon-btn:active{ transform: translateY(4px); box-shadow:none; }

    /* World Selection */
    .world-row{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:10px;
      margin-bottom:12px;
    }
    .world-btn{
      padding:10px 0;
      font-size:22px;
      border:none;
      border-radius:18px;
      background:white;
      box-shadow: 0 5px 0 var(--shadow);
      cursor:pointer;
      transition: all 0.1s;
    }
    .world-btn.active{
      background: var(--secondary);
      box-shadow: 0 5px 0 var(--shadow-active);
      transform: translateY(2px);
    }

    /* Mode Selection */
    .mode-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:14px;
    }
    .mode-btn{
      padding:14px 0;
      font-size:28px;
      border:none;
      border-radius:20px;
      background:white;
      box-shadow:0 5px 0 var(--shadow);
      cursor:pointer;
      transition:all 0.1s;
    }
    .mode-btn.active{
      background: var(--secondary);
      box-shadow:0 5px 0 var(--shadow-active);
      transform: translateY(2px);
    }

    .card{
      background:white;
      border-radius:30px;
      padding:18px;
      flex-grow:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      border:4px solid var(--card-border);
      position:relative;
      overflow:hidden;
    }

    #top-status{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
      font-weight:800;
      color: var(--text);
    }

    .pill{
      background:#fff1f2;
      border:2px solid var(--card-border);
      border-radius:999px;
      padding:6px 10px;
      font-size:13px;
      display:flex;
      align-items:center;
      gap:6px;
      min-width: 120px;
      justify-content:center;
    }

    #visual-hint{
      font-size:30px;
      margin: 10px 0 6px;
      min-height:48px;
      line-height:1.2;
    }

    #prompt{
      font-size:46px;
      font-weight:900;
      margin: 8px 0;
      color: var(--text);
      letter-spacing: 1px;
    }

    #feedback{
      font-weight:900;
      font-size:20px;
      margin: 6px 0 2px;
      height:26px;
    }

    .row-actions{
      width:100%;
      display:flex;
      gap:10px;
      margin-top:10px;
    }

    .big-action{
      flex:1;
      height:56px;
      border-radius:18px;
      border:3px solid var(--border);
      background:#fff5f9;
      color: var(--text);
      font-size:18px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 4px 0 var(--border);
    }
    .big-action:active{ transform: translateY(4px); box-shadow:none; }

    .grid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:12px;
      width:100%;
      margin-top:14px;
    }

    .tap-btn{
      height:84px;
      font-size:34px;
      font-weight:900;
      border:3px solid var(--border);
      border-radius:18px;
      background:#fff5f9;
      color: var(--text);
      cursor:pointer;
      box-shadow:0 5px 0 var(--border);
      position:relative;
      overflow:hidden;
      transform: translateZ(0);
    }
    .tap-btn:active{
      transform: translateY(5px);
      box-shadow:none;
    }
    .tap-btn.disabled{
      opacity:0.35;
      pointer-events:none;
      transform:none !important;
      box-shadow:0 5px 0 var(--border);
      filter: grayscale(0.2);
    }
    .tap-btn.pulse{
      animation: pulse 0.45s ease-out;
    }
    @keyframes pulse{
      0%{ transform: scale(1); }
      40%{ transform: scale(1.05); }
      100%{ transform: scale(1); }
    }

    /* Sticker bank */
    #sticker-title{
      margin-top:12px;
      font-size:13px;
      color:#be185d;
      font-weight:900;
      width:100%;
      text-align:left;
    }

    #sticker-bank{
      width:100%;
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      justify-content:center;
      margin-top:8px;
      padding:10px;
      background:#fff1f2;
      border-radius:15px;
      min-height:54px;
      max-height:98px;
      overflow:auto;
      border:2px solid var(--card-border);
    }

    .sticker{
      font-size:24px;
      animation: popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    @keyframes popIn{
      0%{ transform: scale(0); }
      100%{ transform: scale(1); }
    }

    /* Confetti / sparkles */
    .confetti{
      position:absolute;
      pointer-events:none;
      will-change: transform, opacity;
      font-size:18px;
      top: -20px;
      opacity:0.95;
      animation: fall 900ms linear forwards;
    }
    @keyframes fall{
      to{
        transform: translate(var(--dx), 820px) rotate(var(--rot));
        opacity:0;
      }
    }

    .tap-sparkle{
      position:absolute;
      pointer-events:none;
      font-size:18px;
      animation: sparkle 520ms ease-out forwards;
      transform: translate(-50%,-50%);
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.15));
    }
    @keyframes sparkle{
      0%{ opacity:0; transform: translate(-50%,-50%) scale(0.2); }
      25%{ opacity:1; transform: translate(-50%,-60%) scale(1.05); }
      100%{ opacity:0; transform: translate(-50%,-95%) scale(0.6); }
    }

    /* Crown reward overlay */
    #crown-overlay{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(2px);
      z-index:20;
    }
    #crown-overlay .panel{
      background:#fff;
      border-radius:26px;
      border:4px solid var(--card-border);
      padding:18px 16px;
      width: 86%;
      text-align:center;
      box-shadow:0 16px 40px rgba(0,0,0,0.18);
      animation: popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    #crown-overlay .big{
      font-size:56px;
      margin:6px 0 8px;
    }
    #crown-overlay .msg{
      font-size:18px;
      font-weight:900;
      color: var(--text);
      margin-bottom:10px;
    }
    #crown-overlay .sub{
      font-size:14px;
      font-weight:800;
      color:#be185d;
      margin-bottom:14px;
    }

    /* Parent panel */
    #parent-panel{
      position:absolute;
      inset:0;
      display:none;
      align-items:flex-end;
      justify-content:center;
      background: rgba(0,0,0,0.25);
      z-index:30;
    }
    #parent-panel .sheet{
      width:100%;
      background:#fff;
      border-top-left-radius:22px;
      border-top-right-radius:22px;
      padding:16px;
      border-top: 4px solid var(--card-border);
      box-shadow:0 -18px 50px rgba(0,0,0,0.25);
    }
    #parent-panel h2{
      margin:0 0 10px 0;
      font-size:16px;
      color: var(--text);
      text-align:center;
    }
    .parent-row{
      display:flex;
      gap:10px;
      margin: 10px 0;
    }
    .parent-btn{
      flex:1;
      height:52px;
      border-radius:16px;
      border:3px solid var(--border);
      background:#fff5f9;
      color: var(--text);
      font-weight:900;
      font-size:14px;
      box-shadow:0 4px 0 var(--border);
      cursor:pointer;
    }
    .parent-btn:active{ transform: translateY(4px); box-shadow:none; }

    .small-note{
      text-align:center;
      font-size:12px;
      font-weight:800;
      color:#9d174d;
      opacity:0.9;
      margin-top:6px;
    }
  </style>
</head>
<body>
  <div id="phone-container">
    <header>
      <button id="sound-btn" class="icon-btn" aria-label="Sound">🔊</button>
      <h1 id="title">Princess School 👑</h1>
      <button id="reset-btn" class="icon-btn" aria-label="Reset">🔄</button>
    </header>

    <div class="world-row">
      <button class="world-btn active" id="world-castle" data-world="castle">🏰</button>
      <button class="world-btn" id="world-unicorn" data-world="unicorn">🦄</button>
      <button class="world-btn" id="world-fairy" data-world="fairy">🧚</button>
    </div>

    <div class="mode-row">
      <button id="btn-num" class="mode-btn active">🔢</button>
      <button id="btn-let" class="mode-btn">🔤</button>
    </div>

    <div class="card" id="card">
      <div id="top-status">
        <div class="pill" id="level-pill">Level: 1 👑</div>
        <div class="pill" id="goal-pill">Stickers: 0 / 10 ✨</div>
      </div>

      <div id="visual-hint"></div>
      <div id="prompt">?</div>
      <div id="feedback"></div>

      <div class="row-actions">
        <button id="hint-btn" class="big-action">Hint ✨</button>
        <button id="next-btn" class="big-action">Next ➜</button>
      </div>

      <div id="input-grid" class="grid"></div>

      <div id="sticker-title">My Magic Stickers:</div>
      <div id="sticker-bank"></div>

      <div id="crown-overlay">
        <div class="panel">
          <div class="big">👑</div>
          <div class="msg">Crown earned!</div>
          <div class="sub">You collected 10 stickers!</div>
          <button id="crown-continue" class="big-action" style="width:100%;">Continue ✨</button>
        </div>
      </div>
    </div>

    <div id="parent-panel">
      <div class="sheet">
        <h2>Parent Corner</h2>
        <div class="parent-row">
          <button id="parent-speech" class="parent-btn">Speech: ON</button>
          <button id="parent-difficulty" class="parent-btn">Difficulty: Auto</button>
        </div>
        <div class="parent-row">
          <button id="parent-reset-stickers" class="parent-btn">Reset Stickers</button>
          <button id="parent-close" class="parent-btn">Close</button>
        </div>
        <div class="small-note">Tip: hold “Princess School 👑” for 2 seconds to open this.</div>
      </div>
    </div>
  </div>

  <script>
    // ---------------------------
    // State
    // ---------------------------
    const state = {
      mode: 'numbers',
      world: 'castle',
      answer: null,
      stickers: [],
      stickerGoal: 10,
      collectedCount: 0,
      crowns: 0,

      // learning progression
      correctTotal: 0,
      level: 1,              // 1..3 in numbers, similar idea in letters
      misses: 0,             // for current task
      disabledOptions: new Set(),

      // speech
      speechEnabled: true,
      speechUnlocked: false, // some browsers need user gesture
      lastSpoken: "",

      // difficulty
      difficultyMode: 'auto',  // 'auto' or 'easy' or 'medium' or 'hard'
    };

    const WORLDS = {
      castle: {
        bg1: '#fbcfe8', bg2: '#e9d5ff',
        appBg: '#fdf2f8',
        primary: '#ec4899', secondary: '#a855f7', text: '#831843',
        stickers: ['✨', '💖', '💎', '🌸', '🍭', '🌈', '👑', '🏰'],
        confetti: ['✨','💖','🌸','💎','👑','🏰']
      },
      unicorn: {
        bg1: '#dbeafe', bg2: '#fce7f3',
        appBg: '#f5f3ff',
        primary: '#7c3aed', secondary: '#22c55e', text: '#312e81',
        stickers: ['🦄','✨','🌈','💖','🍬','⭐','🌸','💎'],
        confetti: ['🦄','✨','🌈','⭐','💖','💎']
      },
      fairy: {
        bg1: '#dcfce7', bg2: '#fde68a',
        appBg: '#ecfeff',
        primary: '#14b8a6', secondary: '#f97316', text: '#134e4a',
        stickers: ['🧚','✨','🍃','🌼','⭐','💖','🫧','🌙'],
        confetti: ['🧚','✨','🍃','🌼','⭐','🫧']
      }
    };

    const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const EASY_LETTERS = "ABCDEFGH I J".replaceAll(" ",""); // A-J
    const VOWELS = new Set(['A','E','I','O','U']);

    // ---------------------------
    // DOM
    // ---------------------------
    const $ = (id) => document.getElementById(id);

    const phone = $('phone-container');
    const card = $('card');
    const grid = $('input-grid');
    const promptEl = $('prompt');
    const hintEl = $('visual-hint');
    const feedbackEl = $('feedback');
    const stickerBank = $('sticker-bank');
    const goalPill = $('goal-pill');
    const levelPill = $('level-pill');

    const soundBtn = $('sound-btn');
    const resetBtn = $('reset-btn');

    const btnNum = $('btn-num');
    const btnLet = $('btn-let');

    const hintBtn = $('hint-btn');
    const nextBtn = $('next-btn');

    const crownOverlay = $('crown-overlay');
    const crownContinue = $('crown-continue');

    const parentPanel = $('parent-panel');
    const parentSpeechBtn = $('parent-speech');
    const parentDifficultyBtn = $('parent-difficulty');
    const parentResetStickersBtn = $('parent-reset-stickers');
    const parentCloseBtn = $('parent-close');

    // ---------------------------
    // Helpers
    // ---------------------------
    function applyWorld(worldKey){
      state.world = worldKey;
      const w = WORLDS[worldKey];

      document.documentElement.style.setProperty('--bg1', w.bg1);
      document.documentElement.style.setProperty('--bg2', w.bg2);
      document.documentElement.style.setProperty('--app-bg', w.appBg);
      document.documentElement.style.setProperty('--primary', w.primary);
      document.documentElement.style.setProperty('--secondary', w.secondary);
      document.documentElement.style.setProperty('--text', w.text);

      state.stickers = w.stickers.slice();

      // update world button active state
      for (const k of ['castle','unicorn','fairy']){
        const btn = document.querySelector(`[data-world="${k}"]`);
        btn.classList.toggle('active', k === worldKey);
      }

      // refresh UI bits
      updatePills();
      sparkleBurst(10);
    }

    function shuffle(arr){
      // Fisher-Yates
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function vibrate(ms){
      try { navigator.vibrate?.(ms); } catch(e) {}
    }

    function speak(text){
      state.lastSpoken = text;

      if (!state.speechEnabled) return;
      if (!('speechSynthesis' in window)) return;
      if (!state.speechUnlocked) return; // avoid silent fail until user gesture

      try {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.pitch = 1.35;
        msg.rate = 0.92;
        window.speechSynthesis.speak(msg);
      } catch(e) {}
    }

    function unlockSpeech(){
      // attempt to unlock speech after a user gesture
      state.speechUnlocked = true;
      // say a tiny beep-word to engage (some browsers ignore empty)
      speak("Hello!");
      setTimeout(() => window.speechSynthesis?.cancel?.(), 350);
    }

    function setFeedback(text, type){
      feedbackEl.textContent = text;
      if (type === 'good') feedbackEl.style.color = 'var(--success)';
      else if (type === 'warn') feedbackEl.style.color = 'var(--warn)';
      else feedbackEl.style.color = 'var(--primary)';
    }

    function updatePills(){
      levelPill.textContent = `Level: ${state.level} 👑`;
      goalPill.textContent = `Stickers: ${state.collectedCount % state.stickerGoal} / ${state.stickerGoal} ✨`;
    }

    function clearTaskUI(){
      grid.innerHTML = '';
      hintEl.innerHTML = '';
      promptEl.textContent = '?';
      setFeedback('', 'neutral');
      state.misses = 0;
      state.disabledOptions.clear();
    }

    // Always return exactly 3 unique options, including correct.
    function makeOptions(correct, wrongGenerator, count = 3){
      const set = new Set([correct]);
      let guard = 0;
      while (set.size < count && guard < 200){
        set.add(wrongGenerator());
        guard++;
      }
      return shuffle([...set]).slice(0, count);
    }

    function sparkleAt(x, y, emoji){
      const s = document.createElement('div');
      s.className = 'tap-sparkle';
      s.textContent = emoji;
      s.style.left = x + 'px';
      s.style.top  = y + 'px';
      card.appendChild(s);
      setTimeout(() => s.remove(), 600);
    }

    function sparkleBurst(n = 24){
      const w = WORLDS[state.world];
      for (let i=0;i<n;i++){
        const c = document.createElement('div');
        c.className = 'confetti';
        c.textContent = w.confetti[Math.floor(Math.random()*w.confetti.length)];
        const left = Math.random() * card.clientWidth;
        c.style.left = left + 'px';
        c.style.setProperty('--dx', (Math.random()*200 - 100) + 'px');
        c.style.setProperty('--rot', (Math.random()*720 - 360) + 'deg');
        c.style.fontSize = (14 + Math.random()*14) + 'px';
        c.style.animationDuration = (700 + Math.random()*600) + 'ms';
        card.appendChild(c);
        setTimeout(() => c.remove(), 1400);
      }
    }

    function addSticker(){
      const s = state.stickers[Math.floor(Math.random()*state.stickers.length)];
      const span = document.createElement('span');
      span.className = 'sticker';
      span.textContent = s;
      stickerBank.appendChild(span);
      stickerBank.scrollTop = stickerBank.scrollHeight;

      state.collectedCount++;
      updatePills();

      // Goal reached -> crown reward
      if (state.collectedCount % state.stickerGoal === 0){
        state.crowns++;
        showCrownReward();
      }
    }

    function showCrownReward(){
      sparkleBurst(36);
      vibrate(120);
      speak("Wow! You earned a crown!");
      crownOverlay.style.display = 'flex';
    }

    function hideCrownReward(){
      crownOverlay.style.display = 'none';
      // start a fresh task to keep momentum
      initTask();
    }

    function resetStickers(){
      stickerBank.innerHTML = '';
      state.collectedCount = 0;
      state.crowns = 0;
      updatePills();
      sparkleBurst(16);
      speak("Stickers reset!");
    }

    function resetAll(){
      resetStickers();
      state.correctTotal = 0;
      state.level = 1;
      state.misses = 0;
      updatePills();
      initTask();
    }

    function difficultyFromState(){
      // returns numeric difficulty levels for numbers
      if (state.difficultyMode === 'easy') return 1;
      if (state.difficultyMode === 'medium') return 2;
      if (state.difficultyMode === 'hard') return 3;
      // auto uses state.level
      return state.level;
    }

    // ---------------------------
    // Task generation
    // ---------------------------
    function initTask(){
      clearTaskUI();
      updatePills();

      if (state.mode === 'numbers'){
        initNumbersTask();
      } else {
        initLettersTask();
      }
    }

    function initNumbersTask(){
      const difficulty = difficultyFromState();
      const max = (difficulty === 1) ? 3 : (difficulty === 2) ? 5 : 10;

      const a = Math.floor(Math.random() * (max + 1));
      const b = Math.floor(Math.random() * (max + 1));
      state.answer = a + b;

      promptEl.textContent = `${a} + ${b}`;

      // Visual crowns hint
      hintEl.innerHTML = renderCrowns(a, b);

      // options: near correct, clamp >=0 and <= 20-ish
      const options = makeOptions(
        state.answer,
        () => {
          const delta = (Math.floor(Math.random() * 5) - 2); // -2..+2
          let val = state.answer + delta;
          if (val < 0) val = 0;
          if (val > 20) val = 20;
          return val;
        }
      );

      options.forEach(v => createBtn(String(v), v));

      speak(`What is ${a} plus ${b}? Count the crowns!`);
    }

    function renderCrowns(a, b){
      const left = '👑'.repeat(a || 0);
      const right = '👑'.repeat(b || 0);
      const plus = `<span style="font-weight:900;color:var(--secondary);padding:0 6px;">+</span>`;
      const l = left || `<span style="opacity:0.45;">(none)</span>`;
      const r = right || `<span style="opacity:0.45;">(none)</span>`;
      return `${l} ${plus} ${r}`;
    }

    function initLettersTask(){
      // ramp letters by correctTotal: start A-J, then full alphabet
      const useEasySet = (state.correctTotal < 8) || state.difficultyMode === 'easy';
      const pool = useEasySet ? EASY_LETTERS : ALPHABET;

      const char = pool[Math.floor(Math.random() * pool.length)];
      state.answer = char;

      // sometimes show uppercase and ask for lowercase match
      const doCaseMatch = (state.correctTotal >= 6) && (Math.random() < 0.35);
      if (doCaseMatch){
        promptEl.textContent = char;
        hintEl.innerHTML = `✨ Find the <b>lowercase</b> ✨`;
        const correct = char.toLowerCase();

        const options = makeOptions(
          correct,
          () => {
            const rnd = pool[Math.floor(Math.random() * pool.length)].toLowerCase();
            return rnd;
          }
        );

        options.forEach(v => createBtn(v, v, { display: v }));
        speak(`${char}. Find the lowercase ${char}.`);
        // override answer to lowercase
        state.answer = correct;
        return;
      }

      // normal: show big letter, find same
      promptEl.textContent = char;

      // association hint (simple)
      const assoc = letterAssociation(char);
      hintEl.innerHTML = `✨ Find the letter ✨<div style="font-size:18px;margin-top:4px;font-weight:900;color:var(--secondary);">${assoc}</div>`;

      const options = makeOptions(
        char,
        () => pool[Math.floor(Math.random() * pool.length)]
      );
      options.forEach(v => createBtn(v, v));

      speak(`Can you find the letter ${char}?`);
    }

    function letterAssociation(char){
      // super simple, predictable for little kids
      if (char === 'A') return 'A is for Apple 🍎';
      if (char === 'B') return 'B is for Ball ⚽';
      if (char === 'C') return 'C is for Cat 🐱';
      if (char === 'D') return 'D is for Dog 🐶';
      if (char === 'E') return 'E is for Elephant 🐘';
      if (char === 'F') return 'F is for Flower 🌸';
      if (char === 'G') return 'G is for Gift 🎁';
      if (char === 'H') return 'H is for Heart 💖';
      if (char === 'I') return 'I is for Ice 🍦';
      if (char === 'J') return 'J is for Juice 🧃';
      // fallback
      if (VOWELS.has(char)) return `${char} is a vowel ✨`;
      return `${char} is a magic letter ✨`;
    }

    // ---------------------------
    // Buttons / Answer checking
    // ---------------------------
    function createBtn(label, value, opts = {}){
      const btn = document.createElement('button');
      btn.className = 'tap-btn';
      btn.textContent = opts.display ?? label;
      btn.dataset.value = String(value);

      btn.addEventListener('click', (e) => {
        // tap sparkle feedback
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        sparkleAt(x, y, pickTapSparkle());

        btn.classList.remove('pulse');
        void btn.offsetWidth; // reflow to restart animation
        btn.classList.add('pulse');

        checkAnswer(value, btn);
      });

      grid.appendChild(btn);
    }

    function pickTapSparkle(){
      const w = WORLDS[state.world];
      // pick “cute” from the world confetti set
      return w.confetti[Math.floor(Math.random()*w.confetti.length)];
    }

    function checkAnswer(val, btnEl){
      // If crown overlay is up, ignore taps
      if (crownOverlay.style.display === 'flex') return;

      const correct = (val === state.answer);

      if (correct){
        setFeedback("Yay! You did it! 🌟", 'good');
        vibrate(70);
        sparkleBurst(24);
        addSticker();

        // progression
        state.correctTotal++;
        if (state.mode === 'numbers' && state.difficultyMode === 'auto'){
          if (state.correctTotal === 5) state.level = 2;
          if (state.correctTotal === 10) state.level = 3;
        }
        updatePills();

        speak("Yay! Great job, princess!");

        // if crown overlay is shown, wait for continue
        if (crownOverlay.style.display === 'flex') return;

        // move on quickly
        setTimeout(initTask, 1200);
      } else {
        state.misses++;
        vibrate(25);
        setFeedback("Almost! Try again 💕", 'neutral');
        speak("Almost! Try one more time.");

        // Two misses -> auto help: remove one wrong option
        if (state.misses >= 2){
          autoHelpRemoveOneWrong();
        }
      }
    }

    function autoHelpRemoveOneWrong(){
      // find a button that is not the answer and not already disabled
      const buttons = Array.from(grid.querySelectorAll('button.tap-btn'));
      const candidates = buttons.filter(b => {
        if (b.classList.contains('disabled')) return false;
        const v = b.dataset.value;
        // dataset value for letters might be actual letter; compare as string
        return String(v) !== String(state.answer);
      });

      if (candidates.length === 0) return;

      const pick = candidates[Math.floor(Math.random()*candidates.length)];
      pick.classList.add('disabled');
      // cute poof sparkle at its center
      const rectCard = card.getBoundingClientRect();
      const rect = pick.getBoundingClientRect();
      const x = rect.left - rectCard.left + rect.width/2;
      const y = rect.top - rectCard.top + rect.height/2;
      sparkleAt(x, y, '🫧');
      speak("Here is a little help!");
      setFeedback("Hint: one wrong answer disappeared! 🫧", 'warn');
    }

    // ---------------------------
    // Hint button
    // ---------------------------
    function doHint(){
      if (state.mode === 'numbers'){
        // animate counting crowns
        animateCountCrowns();
        speak("Count the crowns slowly.");
      } else {
        // repeat prompt and give association again
        const shown = promptEl.textContent.trim();
        if (shown.length === 1){
          const assoc = letterAssociation(shown.toUpperCase());
          setFeedback(assoc, 'warn');
          speak(assoc.replace(/[^A-Za-z0-9 ]/g,''));
        } else {
          speak("Look carefully. Find the matching letter.");
        }
      }
    }

    function animateCountCrowns(){
      // Rebuild hint with gentle pulse sequence (very simple)
      const text = promptEl.textContent;
      const m = text.match(/^(\d+)\s*\+\s*(\d+)$/);
      if (!m) return;
      const a = parseInt(m[1], 10);
      const b = parseInt(m[2], 10);

      // build crown spans we can highlight
      const left = Array.from({length:a}, () => '👑');
      const right = Array.from({length:b}, () => '👑');

      hintEl.innerHTML = `
        <span id="crowns-left">${left.map(() => `<span class="c">👑</span>`).join('')}</span>
        <span style="font-weight:900;color:var(--secondary);padding:0 6px;">+</span>
        <span id="crowns-right">${right.map(() => `<span class="c">👑</span>`).join('')}</span>
      `;

      const crowns = Array.from(hintEl.querySelectorAll('.c'));
      let i = 0;

      const tick = () => {
        crowns.forEach(c => c.style.filter = 'none');
        if (i < crowns.length){
          crowns[i].style.filter = 'drop-shadow(0 6px 10px rgba(0,0,0,0.18))';
          sparkleAt(20 + Math.random()*(card.clientWidth-40), 90 + Math.random()*60, '✨');
          i++;
          setTimeout(tick, 250);
        }
      };
      tick();
    }

    // ---------------------------
    // Parent Corner (long press title)
    // ---------------------------
    let titleHoldTimer = null;
    function openParentPanel(){
      parentPanel.style.display = 'flex';
      updateParentButtons();
    }
    function closeParentPanel(){
      parentPanel.style.display = 'none';
    }
    function updateParentButtons(){
      parentSpeechBtn.textContent = `Speech: ${state.speechEnabled ? 'ON' : 'OFF'}`;
      parentDifficultyBtn.textContent = `Difficulty: ${state.difficultyMode[0].toUpperCase()}${state.difficultyMode.slice(1)}`;
    }

    function cycleDifficulty(){
      const order = ['auto','easy','medium','hard'];
      const idx = order.indexOf(state.difficultyMode);
      state.difficultyMode = order[(idx + 1) % order.length];
      if (state.difficultyMode !== 'auto'){
        // keep level shown but it will be overridden by difficulty
        state.level = Math.min(state.level, 3);
      }
      updateParentButtons();
      initTask();
    }

    // ---------------------------
    // Wiring
    // ---------------------------
    // Mode buttons
    btnNum.addEventListener('click', () => {
      unlockSpeech();
      state.mode = 'numbers';
      btnNum.classList.add('active');
      btnLet.classList.remove('active');
      initTask();
    });

    btnLet.addEventListener('click', () => {
      unlockSpeech();
      state.mode = 'letters';
      btnLet.classList.add('active');
      btnNum.classList.remove('active');
      initTask();
    });

    // World buttons
    document.querySelectorAll('.world-btn').forEach(b => {
      b.addEventListener('click', () => {
        unlockSpeech();
        applyWorld(b.dataset.world);
        initTask();
      });
    });

    // Sound toggle
    soundBtn.addEventListener('click', () => {
      unlockSpeech();
      state.speechEnabled = !state.speechEnabled;
      soundBtn.textContent = state.speechEnabled ? '🔊' : '🔇';
      speak(state.speechEnabled ? "Sound on!" : "");
    });

    // Reset
    resetBtn.addEventListener('click', () => {
      unlockSpeech();
      sparkleBurst(18);
      speak("Reset!");
      resetAll();
    });

    // Hint / Next
    hintBtn.addEventListener('click', () => {
      unlockSpeech();
      doHint();
    });

    nextBtn.addEventListener('click', () => {
      unlockSpeech();
      setFeedback("New one! ✨", 'warn');
      speak("New one!");
      initTask();
    });

    // Crown continue
    crownContinue.addEventListener('click', () => {
      unlockSpeech();
      hideCrownReward();
    });

    // Parent panel controls
    parentSpeechBtn.addEventListener('click', () => {
      unlockSpeech();
      state.speechEnabled = !state.speechEnabled;
      soundBtn.textContent = state.speechEnabled ? '🔊' : '🔇';
      updateParentButtons();
      speak(state.speechEnabled ? "Speech is on." : "");
    });

    parentDifficultyBtn.addEventListener('click', () => {
      unlockSpeech();
      cycleDifficulty();
    });

    parentResetStickersBtn.addEventListener('click', () => {
      unlockSpeech();
      resetStickers();
      updateParentButtons();
    });

    parentCloseBtn.addEventListener('click', () => {
      closeParentPanel();
    });

    parentPanel.addEventListener('click', (e) => {
      // tap outside sheet closes
      if (e.target === parentPanel) closeParentPanel();
    });

    // Long press title
    const title = $('title');
    title.addEventListener('pointerdown', () => {
      titleHoldTimer = setTimeout(() => {
        vibrate(60);
        openParentPanel();
        speak("Parent corner.");
      }, 2000);
    });
    title.addEventListener('pointerup', () => { clearTimeout(titleHoldTimer); titleHoldTimer = null; });
    title.addEventListener('pointercancel', () => { clearTimeout(titleHoldTimer); titleHoldTimer = null; });
    title.addEventListener('pointerleave', () => { clearTimeout(titleHoldTimer); titleHoldTimer = null; });

    // Tap anywhere to unlock speech politely (first gesture)
    document.addEventListener('pointerdown', () => {
      if (!state.speechUnlocked) {
        unlockSpeech();
      }
    }, { once:false });

    // ---------------------------
    // Boot
    // ---------------------------
    applyWorld('castle');
    soundBtn.textContent = state.speechEnabled ? '🔊' : '🔇';
    updatePills();
    initTask();
  </script>
</body>
</html>
