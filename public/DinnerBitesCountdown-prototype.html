<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Time Adventure!</title>
    <style>
        /* Base styles */
        body {
            background-color: #a8e6cf;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            overflow: hidden;
        }

        /* Mobile Phone Container */
        #phone-container {
            width: 360px;
            height: 640px;
            background-color: #fff9e6; 
            border: 12px solid #333;
            border-radius: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            box-sizing: border-box;
            overflow: hidden;
        }

        h1 { color: #ff8b94; font-size: 28px; margin: 5px 0 15px 0; text-align: center; }

        /* Unified Control Groups */
        .control-group {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-bottom: 25px;
            position: relative;
        }

        .adj-btn {
            background: #ffecd2;
            color: #ff8b94;
            border: 3px solid #ff8b94;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            margin: 0 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s, opacity 0.3s;
        }
        .adj-btn:active { transform: scale(0.9); }
        .hidden-control { opacity: 0; pointer-events: none; }

        /* Clock Area */
        #clock-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Second Hand styles for mechanical snapping */
        #second-hand {
            transform-origin: 100px 100px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: none; /* Hidden until game starts */
        }
        #clock-center-dot { display: none; }

        /* The Plate */
        #plate-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 220px;
            justify-content: center;
        }
        #plate-svg {
            overflow: visible; 
        }
        
        /* The Main Button */
        #main-btn {
            background-color: #ff8b94;
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 6px 0 #d9666f;
            width: 85%;
            margin-top: auto;
            margin-bottom: 10px;
            transition: background-color 0.3s, box-shadow 0.3s, transform 0.1s;
        }
        #main-btn:active { transform: translateY(6px); box-shadow: none !important; }
        
        #main-btn.eating-mode {
            background-color: #4ecdc4;
            box-shadow: 0 6px 0 #3b9b94;
        }

        /* Reward Overlay */
        #reward-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 249, 230, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; z-index: 10; border-radius: 23px;
        }
        .stars { font-size: 50px; margin: 20px 0; }

    </style>
</head>
<body>

    <div id="phone-container">
        
        <h1 id="header-title">Set the Table!</h1>

        <div class="control-group">
            <button class="adj-btn clock-adj" onclick="adjustTime(-5)">-</button>
            <div id="clock-wrapper">
                <svg width="220" height="120" viewBox="0 0 200 120">
                    <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#e0e0e0" stroke-width="4"/>
                    
                    <path id="time-wedge" d="" fill="#ff8b94" style="transition: d 1s linear;"/>

                    <g id="clock-markers"></g>

                    <line id="second-hand" x1="100" y1="100" x2="25" y2="100" stroke="#4ecdc4" stroke-width="4" stroke-linecap="round"/>
                    <circle id="clock-center-dot" cx="100" cy="100" r="6" fill="#4ecdc4" />
                </svg>
            </div>
            <button class="adj-btn clock-adj" onclick="adjustTime(5)">+</button>
        </div>

        <div class="control-group">
            <button class="adj-btn plate-adj" onclick="adjustBites(-1)">-</button>
            <div id="plate-wrapper">
                <svg id="plate-svg" width="220" height="220" viewBox="0 0 220 220">
                    </svg>
            </div>
            <button class="adj-btn plate-adj" onclick="adjustBites(1)">+</button>
        </div>

        <button id="main-btn" onclick="handleMainAction()">Start Eating! 🚀</button>

        <div id="reward-overlay">
            <h1 id="reward-title">You did it!</h1>
            <div class="stars" id="star-container"></div>
            <h3 id="reward-message" style="color:#555">You are a champion eater!</h3>
            <button id="main-btn" style="width: 70%; margin-top: 20px;" onclick="resetGame()">Play Again 🔁</button>
        </div>

    </div>

    <script>
        // Game State
        let isPlaying = false;
        let setupMinutes = 15;
        let maxMinutes = 30; // Maximum allowed time
        let totalSeconds = setupMinutes * 60;
        let initialBites = 8;
        let currentBites = initialBites;
        let timerInterval;

        const sliceColors = ['#ff9ff3', '#feca57', '#ff6b6b', '#48dbfb', '#1dd1a1', '#ff9f43', '#54a0ff', '#00d2d3'];
        
        const plateSvg = document.getElementById('plate-svg');
        const mainBtn = document.getElementById('main-btn');
        const title = document.getElementById('header-title');
        const secondHand = document.getElementById('second-hand');
        const centerDot = document.getElementById('clock-center-dot');

        // Initialization
        renderClockMarkers();
        updateClockVisuals();
        renderPlate();

        // --- MATH UTILS --- //
        function polarToCartesian(centerX, centerY, radius, angleInDegrees) {
            const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
            return {
                x: centerX + (radius * Math.cos(angleInRadians)),
                y: centerY + (radius * Math.sin(angleInRadians))
            };
        }

        // --- SETUP FUNCTIONS --- //
        function adjustTime(change) {
            if (isPlaying) return;
            setupMinutes += change;
            if (setupMinutes < 5) setupMinutes = 5; 
            if (setupMinutes > maxMinutes) setupMinutes = maxMinutes;
            totalSeconds = setupMinutes * 60;
            updateClockVisuals();
        }

        function adjustBites(change) {
            if (isPlaying) return;
            initialBites += change;
            if (initialBites < 1) initialBites = 1;
            if (initialBites > 16) initialBites = 16;
            currentBites = initialBites;
            renderPlate();
        }

        // --- VISUAL UPDATES --- //
        function renderClockMarkers() {
            const markersGroup = document.getElementById('clock-markers');
            const markerValues = [5, 10, 15, 20, 25];

            markerValues.forEach(val => {
                let f = val / maxMinutes; 
                let angle = f * Math.PI; 

                // Trig coordinates
                let innerX = 100 - 72 * Math.cos(angle);
                let innerY = 100 - 72 * Math.sin(angle);
                let outerX = 100 - 80 * Math.cos(angle);
                let outerY = 100 - 80 * Math.sin(angle);

                let line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", innerX);
                line.setAttribute("y1", innerY);
                line.setAttribute("x2", outerX);
                line.setAttribute("y2", outerY);
                line.setAttribute("stroke", "#bbb");
                line.setAttribute("stroke-width", "3");
                line.setAttribute("stroke-linecap", "round");
                markersGroup.appendChild(line);
            });
        }

        function updateClockVisuals() {
            // 1. UPDATE THE WEDGE (Total Time)
            const maxSeconds = maxMinutes * 60;
            let percentRemaining = totalSeconds / maxSeconds;

            if (percentRemaining <= 0) {
                document.getElementById('time-wedge').setAttribute("d", "M 100 100 L 20 100 Z");
            } else {
                const angle = percentRemaining * Math.PI;
                const endX = 100 - 80 * Math.cos(angle);
                const endY = 100 - 80 * Math.sin(angle);

                let pathString = `M 100 100 L 20 100 A 80 80 0 0 1 ${endX} ${endY} Z`;
                if (percentRemaining === 1) {
                    pathString = `M 100 100 L 20 100 A 80 80 0 0 1 180 100 Z`;
                }
                document.getElementById('time-wedge').setAttribute("d", pathString);
            }

            // 2. UPDATE THE SECOND HAND (Current Minute)
            if (isPlaying && totalSeconds > 0) {
                let currentSec = totalSeconds % 60;
                
                // Treat exactly on the minute as 60 seconds so it starts full
                if (currentSec === 0) currentSec = 60; 

                // Jump in 2-second chunks for that mechanical tick
                let tickSec = Math.ceil(currentSec / 2) * 2;
                
                // Calculate rotation. 60s = 180deg (Right), 0s = 0deg (Left)
                let secFraction = tickSec / 60;
                let rotationAngle = secFraction * 180;
                
                secondHand.style.transform = `rotate(${rotationAngle}deg)`;
            }
        }

        function renderPlate() {
            plateSvg.innerHTML = ''; 
            const center = 110;
            const radius = 100;

            for (let i = 0; i < initialBites; i++) {
                const startAngle = (i / initialBites) * 360;
                const endAngle = ((i + 1) / initialBites) * 360;
                
                const start = polarToCartesian(center, center, radius, endAngle);
                const end = polarToCartesian(center, center, radius, startAngle);
                
                let d;
                if (initialBites === 1) {
                    d = `M ${center} ${center - radius} A ${radius} ${radius} 0 1 1 ${center} ${center + radius} A ${radius} ${radius} 0 1 1 ${center} ${center - radius} Z`;
                } else {
                    const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
                    d = `M ${center} ${center} L ${start.x} ${start.y} A ${radius} ${radius} 0 ${largeArcFlag} 0 ${end.x} ${end.y} Z`;
                }

                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", d);
                path.setAttribute("fill", sliceColors[i % sliceColors.length]);
                path.setAttribute("stroke", "#fff9e6"); 
                path.setAttribute("stroke-width", "4");
                path.setAttribute("id", `slice-${i}`);
                
                path.style.transition = "transform 0.4s ease-in, opacity 0.4s ease-in";
                path.style.transformOrigin = "110px 110px"; 
                
                plateSvg.appendChild(path);
            }
        }

        // --- GAMEPLAY LOGIC --- //
        function handleMainAction() {
            if (!isPlaying) {
                isPlaying = true;
                title.innerText = "Time to Eat! 🍽️";
                mainBtn.innerText = "I took a bite! 😋";
                mainBtn.classList.add('eating-mode');
                
                // Show second hand and hide controls
                secondHand.style.display = 'block';
                centerDot.style.display = 'block';
                document.querySelectorAll('.adj-btn').forEach(btn => btn.classList.add('hidden-control'));

                updateClockVisuals(); // Force initial second hand position

                timerInterval = setInterval(() => {
                    totalSeconds--;
                    updateClockVisuals();

                    if (totalSeconds <= 0) {
                        endGame(false);
                    }
                }, 1000);
            } else {
                if (currentBites <= 0) return;

                const sliceIndex = currentBites - 1;
                const slice = document.getElementById(`slice-${sliceIndex}`);
                
                if (slice) {
                    const angle = ((sliceIndex + 0.5) / initialBites) * 360;
                    const biteGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
                    const biteRadii = [25, 32, 25]; 
                    const angleOffsets = [-15, 0, 15]; 
                    
                    for(let j=0; j<3; j++) {
                        const offsetAngle = angle + angleOffsets[j];
                        const biteCenter = polarToCartesian(110, 110, 95, offsetAngle); 
                        
                        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                        circle.setAttribute("cx", biteCenter.x);
                        circle.setAttribute("cy", biteCenter.y);
                        circle.setAttribute("r", biteRadii[j]);
                        circle.setAttribute("fill", "#fff9e6"); 
                        
                        circle.style.transformOrigin = `${biteCenter.x}px ${biteCenter.y}px`;
                        circle.style.transform = "scale(0)";
                        circle.style.transition = `transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) ${j * 0.1}s`;
                        
                        biteGroup.appendChild(circle);
                        setTimeout(() => { circle.style.transform = "scale(1)"; }, 10);
                    }
                    
                    plateSvg.appendChild(biteGroup);

                    setTimeout(() => {
                        slice.style.transform = "scale(0.7)";
                        slice.style.opacity = "0";
                    }, 400); 
                }

                currentBites--;

                if (currentBites <= 0) {
                    setTimeout(() => endGame(true), 800); 
                }
            }
        }

        function endGame(success) {
            clearInterval(timerInterval);
            const overlay = document.getElementById('reward-overlay');
            const rTitle = document.getElementById('reward-title');
            const rMsg = document.getElementById('reward-message');
            const stars = document.getElementById('star-container');

            // Hide the second hand
            secondHand.style.display = 'none';
            centerDot.style.display = 'none';

            if (success) {
                rTitle.innerText = "YAY! All Done!";
                rMsg.innerText = "You ate all your dinner! Great job!";
                stars.innerHTML = '⭐ ⭐ ⭐';
            } else {
                rTitle.innerText = "Time's Up!";
                rMsg.innerText = "Good try! We'll eat faster next time.";
                stars.innerHTML = '⭐';
            }
            overlay.style.display = 'flex';
        }

        function resetGame() {
            isPlaying = false;
            totalSeconds = setupMinutes * 60;
            currentBites = initialBites;
            
            title.innerText = "Set the Table!";
            mainBtn.innerText = "Start Eating! 🚀";
            mainBtn.classList.remove('eating-mode');
            
            document.querySelectorAll('.adj-btn').forEach(btn => btn.classList.remove('hidden-control'));
            document.getElementById('reward-overlay').style.display = 'none';
            
            updateClockVisuals();
            renderPlate();
        }
    </script>
</body>
</html>
