<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fraction Tester</title>
  <style>
    :root {
      --primary: #214e6b;
      --primary-deep: #17384d;
      --secondary: #ffd166;
      --accent: #67c6c0;
      --surface: #fffdf8;
      --surface-strong: #ffffff;
      --background: linear-gradient(180deg, #f8fbff 0%, #eef8f5 100%);
      --success: #3fbf7f;
      --success-deep: #2b8d5d;
      --danger: #eb6b6b;
      --danger-deep: #c34e4e;
      --muted: #7f98a8;
      --shadow: 0 18px 40px rgba(33, 78, 107, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: var(--background);
      color: var(--primary-deep);
      font-family: "Trebuchet MS", "Comic Sans MS", "Segoe UI", sans-serif;
    }

    .app {
      width: min(100%, 560px);
      background: var(--surface);
      border: 5px solid rgba(33, 78, 107, 0.1);
      border-radius: 32px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      padding: 24px 24px 12px;
      background:
        radial-gradient(circle at top left, rgba(255, 209, 102, 0.45), transparent 36%),
        radial-gradient(circle at top right, rgba(103, 198, 192, 0.28), transparent 34%),
        var(--surface-strong);
    }

    .title {
      margin: 0;
      font-size: clamp(2rem, 5vw, 2.5rem);
      line-height: 1;
      color: var(--primary);
      text-align: center;
    }

    .subtitle {
      margin: 10px 0 0;
      text-align: center;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 700;
    }

    .content {
      padding: 20px 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .score-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .problem-pill,
    .mistake-pill {
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 0.98rem;
      font-weight: 900;
      background: rgba(33, 78, 107, 0.08);
      color: var(--primary);
    }

    .stars {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .star {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 1.1rem;
      background: rgba(33, 78, 107, 0.08);
      color: rgba(33, 78, 107, 0.3);
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .star.correct {
      background: rgba(255, 209, 102, 0.38);
      color: #b57d00;
      transform: scale(1.06);
    }

    .star.current {
      outline: 3px solid rgba(103, 198, 192, 0.4);
      outline-offset: 2px;
    }

    .target-card,
    .builder-card,
    .status-card,
    .finish-card {
      background: var(--surface-strong);
      border-radius: 26px;
      border: 3px solid rgba(33, 78, 107, 0.08);
      box-shadow: 0 10px 24px rgba(33, 78, 107, 0.06);
    }

    .target-card {
      padding: 18px 18px 20px;
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 8px;
      font-size: 0.9rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .target-fraction,
    .user-fraction {
      display: inline-grid;
      grid-template-rows: auto auto auto;
      justify-items: center;
      gap: 4px;
      min-width: 78px;
    }

    .fraction-number {
      font-size: clamp(2.2rem, 7vw, 3rem);
      font-weight: 900;
      line-height: 1;
    }

    .fraction-line {
      width: 76px;
      height: 6px;
      border-radius: 999px;
      background: var(--primary);
    }

    .target-fraction .fraction-number:first-child { color: var(--accent); }

    .builder-card {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .bar-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .bar-label {
      font-size: 0.95rem;
      font-weight: 900;
      color: var(--muted);
    }

    .fraction-bar {
      display: flex;
      width: 100%;
      min-height: 88px;
      border-radius: 22px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(33, 78, 107, 0.05), rgba(33, 78, 107, 0.02));
      border: 4px solid rgba(33, 78, 107, 0.16);
    }

    .fraction-segment {
      flex: 1;
      border-right: 2px solid rgba(33, 78, 107, 0.14);
      transition: background-color 0.22s ease;
      background: transparent;
    }

    .fraction-segment:last-child { border-right: 0; }

    .fraction-segment.filled {
      background: linear-gradient(180deg, #86ddd7 0%, #67c6c0 100%);
    }

    .controls-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .control-card {
      padding: 14px 12px 16px;
      border-radius: 20px;
      background: rgba(33, 78, 107, 0.04);
      border: 2px solid rgba(33, 78, 107, 0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .control-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 900;
      color: var(--primary);
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
    }

    .value-pill {
      min-width: 56px;
      text-align: center;
      font-size: 2rem;
      font-weight: 900;
      color: var(--primary-deep);
    }

    .stepper {
      width: 54px;
      height: 54px;
      border: 0;
      border-radius: 16px;
      background: var(--primary);
      color: white;
      font-size: 2rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 0 var(--primary-deep);
      transition: transform 0.1s ease, box-shadow 0.1s ease, opacity 0.18s ease;
    }

    .stepper:active:not(:disabled) {
      transform: translateY(6px);
      box-shadow: 0 0 0 transparent;
    }

    .stepper:disabled {
      cursor: not-allowed;
      opacity: 0.42;
      box-shadow: 0 6px 0 #9aaeb9;
      background: #c6d2d9;
    }

    .status-card {
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status-copy {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .status-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 900;
      color: var(--primary);
    }

    .status-message {
      margin: 0;
      font-size: 0.98rem;
      color: var(--muted);
      font-weight: 700;
    }

    .check-button,
    .play-again {
      border: 0;
      border-radius: 20px;
      color: white;
      font-size: 1.25rem;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.16s ease;
    }

    .check-button {
      width: 100%;
      padding: 18px 20px;
      background: var(--primary);
      box-shadow: 0 8px 0 var(--primary-deep);
    }

    .check-button.correct {
      background: var(--success);
      box-shadow: 0 8px 0 var(--success-deep);
    }

    .check-button.wrong {
      background: var(--danger);
      box-shadow: 0 8px 0 var(--danger-deep);
    }

    .check-button:active:not(:disabled),
    .play-again:active {
      transform: translateY(8px);
      box-shadow: 0 0 0 transparent;
    }

    .check-button:disabled { cursor: default; }

    .finish-card {
      display: none;
      padding: 28px 24px 32px;
      text-align: center;
      gap: 18px;
    }

    .finish-card.visible {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .finish-title {
      margin: 0;
      font-size: clamp(2rem, 6vw, 2.7rem);
      color: var(--primary);
      line-height: 1;
    }

    .finish-score {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--muted);
    }

    .play-again {
      padding: 16px 28px;
      background: var(--accent);
      box-shadow: 0 8px 0 #3e9f98;
    }

    .hidden { display: none; }
    .shake { animation: shake 0.45s ease; }
    .pop { animation: pop 0.42s ease; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }

    @keyframes pop {
      0% { transform: scale(0.96); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    @media (max-width: 560px) {
      body { padding: 12px; }
      .app { border-radius: 24px; }
      .content, .header { padding-left: 16px; padding-right: 16px; }
      .controls-grid { grid-template-columns: 1fr; }
      .status-card { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <h1 class="title">Fraction Tester</h1>
      <p class="subtitle">Build the matching fraction bar and check your answer.</p>
    </section>

    <section class="content" id="game-screen">
      <div class="score-row">
        <div class="problem-pill" id="problem-pill">Puzzle 1 of 5</div>
        <div class="stars" id="stars"></div>
        <div class="mistake-pill" id="mistake-pill">Mistakes left: 3</div>
      </div>

      <section class="target-card">
        <p class="eyebrow">Make This Fraction</p>
        <div class="target-fraction" aria-live="polite">
          <span class="fraction-number" id="target-num">1</span>
          <span class="fraction-line"></span>
          <span class="fraction-number" id="target-den">2</span>
        </div>
      </section>

      <section class="builder-card" id="builder-card">
        <div class="bar-wrap">
          <span class="bar-label">Your fraction bar</span>
          <div class="fraction-bar" id="fraction-bar" aria-hidden="true"></div>
        </div>

        <div class="target-card" style="padding: 14px 16px;">
          <p class="eyebrow" style="margin-bottom: 10px;">Your Answer</p>
          <div class="user-fraction">
            <span class="fraction-number" id="user-num">1</span>
            <span class="fraction-line"></span>
            <span class="fraction-number" id="user-den">2</span>
          </div>
        </div>

        <div class="controls-grid">
          <section class="control-card">
            <p class="control-title">Numerator</p>
            <div class="control-row">
              <button class="stepper" id="num-minus" type="button" aria-label="Decrease numerator">-</button>
              <div class="value-pill" id="num-value">1</div>
              <button class="stepper" id="num-plus" type="button" aria-label="Increase numerator">+</button>
            </div>
          </section>

          <section class="control-card">
            <p class="control-title">Denominator</p>
            <div class="control-row">
              <button class="stepper" id="den-minus" type="button" aria-label="Decrease denominator">-</button>
              <div class="value-pill" id="den-value">2</div>
              <button class="stepper" id="den-plus" type="button" aria-label="Increase denominator">+</button>
            </div>
          </section>
        </div>
      </section>

      <section class="status-card" id="status-card" aria-live="polite">
        <div class="status-copy">
          <p class="status-title">Ready to check?</p>
          <p class="status-message" id="status-message">Equivalent fractions count as correct.</p>
        </div>
      </section>

      <button class="check-button" id="check-button" type="button">Check Answer</button>
    </section>

    <section class="finish-card" id="finish-card">
      <h2 class="finish-title">All Done!</h2>
      <p class="finish-score" id="finish-score">You solved 0 out of 5 puzzles.</p>
      <button class="play-again" id="play-again" type="button">Play Again</button>
    </section>
  </main>

  <script>
    const MAX_PROBLEMS = 5;
    const MAX_MISTAKES = 3;
    const MAX_DENOMINATOR = 10;
    const MIN_DENOMINATOR = 2;
    const CELEBRATION_DELAY_MS = 1500;
    const SHAKE_DURATION_MS = 600;

    const state = {
      problemIndex: 0,
      successCount: 0,
      retryCount: 0,
      targetNum: 1,
      targetDen: 2,
      userNum: 1,
      userDen: 2,
      feedback: 'idle',
      timerId: null,
      finished: false,
    };

    const elements = {
      gameScreen: document.getElementById('game-screen'),
      finishCard: document.getElementById('finish-card'),
      finishScore: document.getElementById('finish-score'),
      problemPill: document.getElementById('problem-pill'),
      mistakePill: document.getElementById('mistake-pill'),
      stars: document.getElementById('stars'),
      targetNum: document.getElementById('target-num'),
      targetDen: document.getElementById('target-den'),
      userNum: document.getElementById('user-num'),
      userDen: document.getElementById('user-den'),
      numValue: document.getElementById('num-value'),
      denValue: document.getElementById('den-value'),
      fractionBar: document.getElementById('fraction-bar'),
      statusMessage: document.getElementById('status-message'),
      checkButton: document.getElementById('check-button'),
      builderCard: document.getElementById('builder-card'),
      numMinus: document.getElementById('num-minus'),
      numPlus: document.getElementById('num-plus'),
      denMinus: document.getElementById('den-minus'),
      denPlus: document.getElementById('den-plus'),
      playAgain: document.getElementById('play-again'),
    };

    function clearTimer() {
      if (state.timerId) {
        window.clearTimeout(state.timerId);
        state.timerId = null;
      }
    }

    function gcd(a, b) {
      let x = Math.abs(a);
      let y = Math.abs(b);
      while (y !== 0) {
        const temp = y;
        y = x % y;
        x = temp;
      }
      return x || 1;
    }

    function normalizeFraction(num, den) {
      const divisor = gcd(num, den);
      return { num: num / divisor, den: den / divisor };
    }

    function isEquivalentFraction(aNum, aDen, bNum, bDen) {
      const left = normalizeFraction(aNum, aDen);
      const right = normalizeFraction(bNum, bDen);
      return left.num === right.num && left.den === right.den;
    }

    function generateFractionProblem() {
      const denominator = Math.floor(Math.random() * 5) + 2;
      const numerator = Math.floor(Math.random() * denominator) + 1;
      return { num: numerator, den: denominator };
    }

    function updateScoreboard() {
      elements.problemPill.textContent = `Puzzle ${state.problemIndex + 1} of ${MAX_PROBLEMS}`;
      elements.mistakePill.textContent = `Mistakes left: ${Math.max(0, MAX_MISTAKES - state.retryCount)}`;
      elements.stars.innerHTML = '';

      for (let index = 0; index < MAX_PROBLEMS; index += 1) {
        const star = document.createElement('div');
        star.className = 'star';
        star.textContent = index < state.successCount ? '★' : '☆';
        if (index < state.successCount) {
          star.classList.add('correct');
        }
        if (index === state.problemIndex && !state.finished) {
          star.classList.add('current');
        }
        elements.stars.appendChild(star);
      }
    }

    function updateDisplayedFractions() {
      elements.targetNum.textContent = String(state.targetNum);
      elements.targetDen.textContent = String(state.targetDen);
      elements.userNum.textContent = String(state.userNum);
      elements.userDen.textContent = String(state.userDen);
      elements.numValue.textContent = String(state.userNum);
      elements.denValue.textContent = String(state.userDen);
    }

    function updateBar() {
      elements.fractionBar.innerHTML = '';
      for (let index = 0; index < state.userDen; index += 1) {
        const segment = document.createElement('div');
        segment.className = 'fraction-segment';
        if (index < state.userNum) {
          segment.classList.add('filled');
        }
        elements.fractionBar.appendChild(segment);
      }
    }

    function updateControls() {
      const locked = state.feedback === 'correct' || state.finished;
      elements.numMinus.disabled = locked || state.userNum <= 1;
      elements.numPlus.disabled = locked || state.userNum >= state.userDen;
      elements.denMinus.disabled = locked || state.userDen <= MIN_DENOMINATOR;
      elements.denPlus.disabled = locked || state.userDen >= MAX_DENOMINATOR;
      elements.checkButton.disabled = state.finished || state.feedback === 'correct';
    }

    function updateStatus() {
      elements.builderCard.classList.remove('shake', 'pop');
      void elements.builderCard.offsetWidth;

      if (state.feedback === 'correct') {
        elements.builderCard.classList.add('pop');
        elements.statusMessage.textContent = 'Correct. Moving to the next puzzle...';
        elements.checkButton.className = 'check-button correct';
        elements.checkButton.textContent = 'Brilliant!';
        return;
      }

      if (state.feedback === 'wrong') {
        elements.builderCard.classList.add('shake');
        const mistakesLeft = Math.max(0, MAX_MISTAKES - state.retryCount);
        elements.statusMessage.textContent = mistakesLeft > 0
          ? `Not quite. Try again. Mistakes left: ${mistakesLeft}.`
          : 'Too many misses. Moving to the next puzzle...';
        elements.checkButton.className = 'check-button wrong';
        elements.checkButton.textContent = 'Try Again';
        return;
      }

      elements.statusMessage.textContent = 'Equivalent fractions count as correct.';
      elements.checkButton.className = 'check-button';
      elements.checkButton.textContent = 'Check Answer';
    }

    function render() {
      updateScoreboard();
      updateDisplayedFractions();
      updateBar();
      updateControls();
      updateStatus();
    }

    function nextProblem() {
      clearTimer();
      const problem = generateFractionProblem();
      state.targetNum = problem.num;
      state.targetDen = problem.den;
      state.userNum = 1;
      state.userDen = 2;
      state.retryCount = 0;
      state.feedback = 'idle';
      render();
    }

    function finishGame() {
      state.finished = true;
      clearTimer();
      elements.gameScreen.classList.add('hidden');
      elements.finishCard.classList.add('visible');
      elements.finishScore.textContent = `You solved ${state.successCount} out of ${MAX_PROBLEMS} puzzles.`;
    }

    function advanceAfterDelay() {
      state.timerId = window.setTimeout(() => {
        if (state.problemIndex + 1 >= MAX_PROBLEMS) {
          finishGame();
          return;
        }
        state.problemIndex += 1;
        nextProblem();
      }, CELEBRATION_DELAY_MS);
    }

    function checkAnswer() {
      if (state.feedback !== 'idle' || state.finished) return;

      const isCorrect = isEquivalentFraction(
        state.userNum,
        state.userDen,
        state.targetNum,
        state.targetDen
      );

      if (isCorrect) {
        state.feedback = 'correct';
        state.successCount += 1;
        render();
        advanceAfterDelay();
        return;
      }

      state.feedback = 'wrong';
      state.retryCount += 1;
      render();

      if (state.retryCount >= MAX_MISTAKES) {
        advanceAfterDelay();
        return;
      }

      state.timerId = window.setTimeout(() => {
        state.feedback = 'idle';
        render();
      }, SHAKE_DURATION_MS);
    }

    function resetGame() {
      clearTimer();
      state.problemIndex = 0;
      state.successCount = 0;
      state.retryCount = 0;
      state.feedback = 'idle';
      state.finished = false;
      elements.finishCard.classList.remove('visible');
      elements.gameScreen.classList.remove('hidden');
      nextProblem();
    }

    elements.numMinus.addEventListener('click', () => {
      if (state.feedback !== 'idle') return;
      state.userNum = Math.max(1, state.userNum - 1);
      render();
    });

    elements.numPlus.addEventListener('click', () => {
      if (state.feedback !== 'idle') return;
      state.userNum = Math.min(state.userDen, state.userNum + 1);
      render();
    });

    elements.denMinus.addEventListener('click', () => {
      if (state.feedback !== 'idle') return;
      state.userDen = Math.max(MIN_DENOMINATOR, state.userDen - 1);
      if (state.userNum > state.userDen) {
        state.userNum = state.userDen;
      }
      render();
    });

    elements.denPlus.addEventListener('click', () => {
      if (state.feedback !== 'idle') return;
      state.userDen = Math.min(MAX_DENOMINATOR, state.userDen + 1);
      render();
    });

    elements.checkButton.addEventListener('click', checkAnswer);
    elements.playAgain.addEventListener('click', resetGame);

    nextProblem();
  </script>
</body>
</html>
