<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Lab Adventure!</title>
    <style>
        /* Base styles */
        body {
            background-color: #a8e6cf;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            overflow: hidden;
        }

        /* Mobile Phone Container */
        #phone-container {
            width: 380px;
            height: 720px;
            background-color: #fff9e6; 
            border: 12px solid #333;
            border-radius: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            box-sizing: border-box;
            overflow: hidden;
        }

        h1 { color: #333; font-size: 24px; margin: 0 0 5px 0; text-align: center; }
        
        #target-time-display {
            background: #ffeaa7;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 22px;
            color: #d63031;
            margin-bottom: 15px;
            border: 2px dashed #d63031;
        }

        /* Digital Clock */
        #digital-clock {
            font-size: 32px;
            font-weight: bold;
            background: #333;
            padding: 10px 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.5);
        }
        .dig-hr { color: #54a0ff; }
        .dig-min { color: #1dd1a1; }
        .dig-sec { color: #ff6b6b; }
        .dig-colon { color: #fff; animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0.3; } }

        /* Analogue Clock */
        #clock-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        /* Smooth mechanical spinning */
        .hand {
            transform-origin: 100px 100px;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            stroke-linecap: round;
        }

        /* Unified Control Grid */
        .controls-grid {
            display: grid;
            grid-template-columns: auto 100px auto;
            gap: 12px 15px;
            align-items: center;
            margin-bottom: 20px;
            width: 85%;
        }

        .label {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        .adj-btn {
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .adj-btn:active { transform: scale(0.9) translateY(4px); box-shadow: none !important; }

        /* Color Coding */
        .hr-btn { background: #c8d9f9; color: #54a0ff; border: 3px solid #54a0ff; box-shadow: 0 4px 0 #54a0ff; }
        .hr-label { color: #54a0ff; }
        
        .min-btn { background: #c8f9eb; color: #1dd1a1; border: 3px solid #1dd1a1; box-shadow: 0 4px 0 #1dd1a1; }
        .min-label { color: #1dd1a1; }
        
        .sec-btn { background: #f9c8c8; color: #ff6b6b; border: 3px solid #ff6b6b; box-shadow: 0 4px 0 #ff6b6b; }
        .sec-label { color: #ff6b6b; }

        /* The Main Button */
        #main-btn {
            background-color: #a29bfe;
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 6px 0 #6c5ce7;
            width: 85%;
            margin-top: auto;
            margin-bottom: 10px;
            transition: background-color 0.3s, box-shadow 0.1s, transform 0.1s;
        }
        #main-btn:active { transform: translateY(6px); box-shadow: none !important; }

        /* Reward Overlay */
        #reward-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 249, 230, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; z-index: 10; border-radius: 23px;
        }
        .stars { font-size: 50px; margin: 20px 0; }

    </style>
</head>
<body>

    <div id="phone-container">
        
        <h1 id="header-title">Make the clock say:</h1>
        <div id="target-time-display">--:--:--</div>

        <div id="digital-clock">
            <span class="dig-hr" id="dig-hr">12</span><span class="dig-colon">:</span><span class="dig-min" id="dig-min">00</span><span class="dig-colon">:</span><span class="dig-sec" id="dig-sec">00</span>
        </div>

        <div id="clock-wrapper">
            <svg width="220" height="220" viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="95" fill="white" stroke="#e0e0e0" stroke-width="6"/>
                
                <g id="clock-markers"></g>

                <line id="hour-hand" class="hand" x1="100" y1="100" x2="100" y2="55" stroke="#54a0ff" stroke-width="8" />
                <line id="minute-hand" class="hand" x1="100" y1="100" x2="100" y2="30" stroke="#1dd1a1" stroke-width="5" />
                <line id="second-hand" class="hand" x1="100" y1="100" x2="100" y2="15" stroke="#ff6b6b" stroke-width="2" />
                
                <circle cx="100" cy="100" r="6" fill="#333" />
            </svg>
        </div>

        <div class="controls-grid">
            <button class="adj-btn hr-btn" onclick="adjustTime(-3600)">-</button>
            <span class="label hr-label">Hours</span>
            <button class="adj-btn hr-btn" onclick="adjustTime(3600)">+</button>

            <button class="adj-btn min-btn" onclick="adjustTime(-60)">-</button>
            <span class="label min-label">Minutes</span>
            <button class="adj-btn min-btn" onclick="adjustTime(60)">+</button>

            <button class="adj-btn sec-btn" onclick="adjustTime(-15)">-</button>
            <span class="label sec-label">Seconds</span>
            <button class="adj-btn sec-btn" onclick="adjustTime(15)">+</button>
        </div>

        <button id="main-btn" onclick="checkMatch()">Check Time! ⏱️</button>

        <div id="reward-overlay">
            <h1 id="reward-title">You did it!</h1>
            <div class="stars" id="star-container"></div>
            <h3 id="reward-message" style="color:#555">The clocks match perfectly!</h3>
            <button id="main-btn" style="width: 70%; margin-top: 20px; background-color:#54a0ff; box-shadow: 0 6px 0 #3b7bcf;" onclick="startNewRound()">Play Again 🔁</button>
        </div>

    </div>

    <script>
        // Game State (Time is represented purely in absolute seconds to ensure smooth 360-degree wrapping)
        let absoluteSeconds = 0; // Starts at 12:00:00 (0 seconds)
        let targetTotalSeconds = 0;

        // DOM Elements
        const hourHand = document.getElementById('hour-hand');
        const minuteHand = document.getElementById('minute-hand');
        const secondHand = document.getElementById('second-hand');
        
        const digHr = document.getElementById('dig-hr');
        const digMin = document.getElementById('dig-min');
        const digSec = document.getElementById('dig-sec');
        
        const targetDisplay = document.getElementById('target-time-display');
        const overlay = document.getElementById('reward-overlay');

        // Initialization
        renderClockFace();
        startNewRound();
        updateVisuals();

        // --- SETUP FUNCTIONS --- //
        
        function startNewRound() {
            overlay.style.display = 'none';
            absoluteSeconds = 0; // Reset user clock to 12:00:00
            
            // Generate a random target time
            // Hours: 1-12. Minutes: increments of 5. Seconds: increments of 15.
            const rHour = Math.floor(Math.random() * 12); // 0-11 (where 0 is 12)
            const rMin = Math.floor(Math.random() * 12) * 5; 
            const rSec = Math.floor(Math.random() * 4) * 15;
            
            targetTotalSeconds = (rHour * 3600) + (rMin * 60) + rSec;
            
            // Format target string
            let dH = rHour === 0 ? 12 : rHour;
            let formattedTime = `${String(dH).padStart(2, '0')}:${String(rMin).padStart(2, '0')}:${String(rSec).padStart(2, '0')}`;
            targetDisplay.innerText = formattedTime;
            
            updateVisuals();
        }

        function adjustTime(secondsToAdd) {
            absoluteSeconds += secondsToAdd;
            
            // Prevent going backward past 12:00:00 to keep the prototype simple
            if (absoluteSeconds < 0) absoluteSeconds = 0;
            
            updateVisuals();
        }

        // --- VISUAL UPDATES --- //

        function renderClockFace() {
            const markersGroup = document.getElementById('clock-markers');
            
            for (let i = 0; i < 60; i++) {
                let isHour = (i % 5 === 0);
                let angle = (i / 60) * (2 * Math.PI) - (Math.PI / 2); // Start at top
                
                let innerRadius = isHour ? 75 : 85;
                let outerRadius = 95;
                
                let innerX = 100 + innerRadius * Math.cos(angle);
                let innerY = 100 + innerRadius * Math.sin(angle);
                let outerX = 100 + outerRadius * Math.cos(angle);
                let outerY = 100 + outerRadius * Math.sin(angle);

                let line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", innerX);
                line.setAttribute("y1", innerY);
                line.setAttribute("x2", outerX);
                line.setAttribute("y2", outerY);
                line.setAttribute("stroke", isHour ? "#333" : "#ccc");
                line.setAttribute("stroke-width", isHour ? "4" : "2");
                line.setAttribute("stroke-linecap", "round");
                markersGroup.appendChild(line);
            }
        }

        function updateVisuals() {
            // 1. Calculate base units from absolute seconds
            // We use % 43200 (12 hours in seconds) to format the digital readout naturally
            let displaySecs = absoluteSeconds % 43200; 
            
            let h = Math.floor(displaySecs / 3600);
            let m = Math.floor((displaySecs % 3600) / 60);
            let s = displaySecs % 60;

            let displayHour = h === 0 ? 12 : h;

            // 2. Update Digital Clock
            digHr.innerText = String(displayHour).padStart(2, '0');
            digMin.innerText = String(m).padStart(2, '0');
            digSec.innerText = String(s).padStart(2, '0');

            // 3. Update Analogue Hands (Using absolute logic so it spins multiple times without snapping backward)
            let secAngle = absoluteSeconds * 6; // 1 sec = 6 degrees
            let minAngle = absoluteSeconds * 0.1; // 60 secs = 6 degrees -> 1 sec = 0.1 degrees
            let hrAngle = absoluteSeconds * (30 / 3600); // 3600 secs (1 hr) = 30 degrees

            secondHand.style.transform = `rotate(${secAngle}deg)`;
            minuteHand.style.transform = `rotate(${minAngle}deg)`;
            hourHand.style.transform = `rotate(${hrAngle}deg)`;
        }

        // --- GAMEPLAY LOGIC --- //

        function checkMatch() {
            // Compare normalized seconds (so 12:00 is the same whether they spun it 0 times or 2 times around)
            const normalizedCurrent = absoluteSeconds % 43200;
            const normalizedTarget = targetTotalSeconds % 43200;

            const rTitle = document.getElementById('reward-title');
            const rMsg = document.getElementById('reward-message');
            const stars = document.getElementById('star-container');

            if (normalizedCurrent === normalizedTarget) {
                rTitle.innerText = "Time Genius!";
                rTitle.style.color = "#1dd1a1";
                rMsg.innerText = "The clocks match perfectly! Great job!";
                stars.innerHTML = '⭐ ⭐ ⭐';
                overlay.style.display = 'flex';
            } else {
                // Flash the target red to say "not quite"
                const targetBox = document.getElementById('target-time-display');
                targetBox.style.transform = "scale(1.1)";
                targetBox.style.backgroundColor = "#ff7675";
                targetBox.style.color = "white";
                
                setTimeout(() => {
                    targetBox.style.transform = "scale(1)";
                    targetBox.style.backgroundColor = "#ffeaa7";
                    targetBox.style.color = "#d63031";
                }, 300);
            }
        }
    </script>
</body>
</html>
