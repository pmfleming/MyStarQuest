<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Time Explorer</title>
    <style>
        /* Base styles */
        body {
            background-color: #0f172a; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            overflow: hidden;
            transition: background-color 0.8s ease;
        }

        #phone-container {
            width: 380px;
            height: 760px; /* Made slightly taller to comfortably fit all components */
            background-color: rgba(255, 255, 255, 0.95); 
            border: 12px solid #333;
            border-radius: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 15px;
            box-sizing: border-box;
            overflow: hidden;
            transition: background-color 0.8s ease;
        }

        /* 1. Globe Container (Top) */
        #globe-window {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            position: relative;
            background-color: #1e3799; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2), 
                        inset 0 0 0 4px rgba(255,255,255,0.5);
            margin-bottom: 15px;
            overflow: hidden;
            flex-shrink: 0;
        }

        #globe-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 220px;
            height: 220px;
            cursor: grab;
        }
        #globe-canvas:active { cursor: grabbing; }

        /* 2. Digital Display (Middle-Top) */
        #digital-clock {
            font-size: 34px;
            font-weight: bold;
            color: #2d3436;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.05);
            padding: 5px 20px;
            border-radius: 20px;
        }
        #ampm { font-size: 18px; color: #636e72; }
        #weather-icon { font-size: 28px; }

        /* 3. Analogue Clock (Middle-Bottom) */
        #clock-wrapper {
            position: relative;
            margin-bottom: 20px;
        }
        .hand {
            transform-origin: 100px 100px;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            stroke-linecap: round;
        }

        /* 4. Controls (Bottom) */
        .controls-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            margin-top: auto;
            margin-bottom: 10px;
        }

        .btn-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 100%;
        }

        .time-btn {
            color: white;
            border: none;
            padding: 12px 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            width: 120px;
        }
        .time-btn:active { transform: translateY(4px); box-shadow: none !important; }

        /* Color Coded Buttons matching the clock hands */
        .hr-btn { background-color: #54a0ff; box-shadow: 0 4px 0 #3b7bcf; }
        .min-btn { background-color: #1dd1a1; box-shadow: 0 4px 0 #10ac84; }

        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            z-index: 5;
            text-align: center;
        }
    </style>

    <script type='text/javascript' src='https://d3js.org/d3.v3.min.js'></script>
    <script type='text/javascript' src='https://d3js.org/topojson.v1.min.js'></script>
    <script type='text/javascript' src='https://unpkg.com/planetary.js@1.1.2/dist/planetaryjs.min.js'></script>
</head>
<body>

    <div id="phone-container">
        
        <div id="globe-window">
            <div id="loading">Building...</div>
            <canvas id="globe-canvas" width="220" height="220"></canvas>
        </div>

        <div id="digital-clock">
            <span id="weather-icon">☀️</span>
            <span id="time-text">12:00</span>
            <span id="ampm">PM</span>
        </div>

        <div id="clock-wrapper">
            <svg width="200" height="200" viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="95" fill="white" stroke="#e0e0e0" stroke-width="6"/>
                <g id="clock-markers"></g>
                <line id="hour-hand" class="hand" x1="100" y1="100" x2="100" y2="55" stroke="#54a0ff" stroke-width="8" />
                <line id="minute-hand" class="hand" x1="100" y1="100" x2="100" y2="30" stroke="#1dd1a1" stroke-width="5" />
                <circle cx="100" cy="100" r="6" fill="#333" />
            </svg>
        </div>

        <div class="controls-container">
            <div class="btn-row">
                <button class="time-btn hr-btn" onclick="adjustTime(-60)">- 1 Hour</button>
                <button class="time-btn hr-btn" onclick="adjustTime(60)">+ 1 Hour</button>
            </div>
            <div class="btn-row">
                <button class="time-btn min-btn" onclick="adjustTime(-15)">- 15 Min</button>
                <button class="time-btn min-btn" onclick="adjustTime(15)">+ 15 Min</button>
            </div>
        </div>

    </div>

    <script>
        let currentMinutes = 720; // Start at 12:00 PM (Noon)
        const amsterdamLat = 52.37;
        const amsterdamLng = 4.90;

        const timeText = document.getElementById('time-text');
        const ampmText = document.getElementById('ampm');
        const weatherIcon = document.getElementById('weather-icon');
        const phoneContainer = document.getElementById('phone-container');
        const hourHand = document.getElementById('hour-hand');
        const minuteHand = document.getElementById('minute-hand');

        // --- DRAW CLOCK MARKERS ---
        function renderClockFace() {
            const markersGroup = document.getElementById('clock-markers');
            for (let i = 0; i < 60; i++) {
                let isHour = (i % 5 === 0);
                let angle = (i / 60) * (2 * Math.PI) - (Math.PI / 2);
                let innerRadius = isHour ? 78 : 86;
                let outerRadius = 95;
                
                let innerX = 100 + innerRadius * Math.cos(angle);
                let innerY = 100 + innerRadius * Math.sin(angle);
                let outerX = 100 + outerRadius * Math.cos(angle);
                let outerY = 100 + outerRadius * Math.sin(angle);

                let line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", innerX);
                line.setAttribute("y1", innerY);
                line.setAttribute("x2", outerX);
                line.setAttribute("y2", outerY);
                line.setAttribute("stroke", isHour ? "#333" : "#ccc");
                line.setAttribute("stroke-width", isHour ? "4" : "2");
                line.setAttribute("stroke-linecap", "round");
                markersGroup.appendChild(line);
            }
        }
        renderClockFace();

        // --- PLANETARY.JS SETUP ---
        var planet = planetaryjs.planet();

        planet.loadPlugin(planetaryjs.plugins.earth({
            topojson: { file: 'https://unpkg.com/world-atlas@1.1.4/world/110m.json' },
            oceans:   { fill: '#1e3799' },
            land:     { fill: '#2ed573' },
            borders:  { stroke: '#1e3799', strokeWidth: 0.5 }
        }));

        planet.loadPlugin(function(planet) {
            var nightCircle = d3.geo.circle().angle(90);

            planet.onDraw(function() {
                let timeDifference = currentMinutes - 720; 
                let degreesRotated = timeDifference * 0.25; 
                let sunLongitude = amsterdamLng - degreesRotated;
                let viewLongitude = sunLongitude + 90;

                planet.projection.rotate([-viewLongitude, -amsterdamLat, 0]);

                let antiSolarPoint = [sunLongitude + 180, 0];
                nightCircle.origin(antiSolarPoint);

                planet.context.beginPath();
                planet.path(nightCircle());
                planet.context.fillStyle = "rgba(0, 5, 25, 0.65)"; 
                planet.context.fill();
            });
        });

        planet.loadPlugin(planetaryjs.plugins.pings());

        planet.loadPlugin(planetaryjs.plugins.drag({
            onDragStart: function() {
                this.plugins.drag.originalRotation = planet.projection.rotate();
            }
        }));

        // Scaled down slightly to fit the 220x220 canvas
        planet.projection.scale(108).translate([110, 110]); 
        var canvas = document.getElementById('globe-canvas');
        planet.draw(canvas);

        setTimeout(() => document.getElementById('loading').style.display = 'none', 1000);

        setInterval(function() {
            planet.plugins.pings.add(amsterdamLng, amsterdamLat, { color: '#ff4757', ttl: 1500, angle: 6 });
        }, 1000);

        // --- TIME & UI LOGIC ---
        function adjustTime(minutes) {
            currentMinutes += minutes;
            if (currentMinutes < 0) currentMinutes += 1440;
            if (currentMinutes >= 1440) currentMinutes -= 1440;
            
            updateUI();
        }

        function updateUI() {
            let h = Math.floor(currentMinutes / 60);
            let m = currentMinutes % 60;
            
            // Digital Update
            let displayHour = h % 12;
            if (displayHour === 0) displayHour = 12; 
            let displayAmPm = h < 12 ? "AM" : "PM";

            timeText.innerText = `${String(displayHour).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
            ampmText.innerText = displayAmPm;

            // Analogue Update
            // Minute hand spins 360 degrees in 60 minutes
            let minAngle = (m / 60) * 360;
            // Hour hand spins 360 degrees in 12 hours (720 minutes)
            let hrAngle = ((currentMinutes % 720) / 720) * 360;

            minuteHand.style.transform = `rotate(${minAngle}deg)`;
            hourHand.style.transform = `rotate(${hrAngle}deg)`;

            // Environment Background Update
            let sunHeight = Math.sin(((currentMinutes - 360) / 720) * Math.PI);
            if (sunHeight > 0.2) {
                document.body.style.backgroundColor = '#74b9ff';
                phoneContainer.style.backgroundColor = '#fdfbfb';
                weatherIcon.innerText = '☀️';
            } else if (sunHeight > -0.2) {
                document.body.style.backgroundColor = '#fdcb6e';
                phoneContainer.style.backgroundColor = '#fff3e0';
                weatherIcon.innerText = h < 12 ? '🌅' : '🌇';
            } else {
                document.body.style.backgroundColor = '#1e272e';
                phoneContainer.style.backgroundColor = '#dfe6e9';
                weatherIcon.innerText = '🌙';
            }
        }

        updateUI();

    </script>
</body>
</html>
